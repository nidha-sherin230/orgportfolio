<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Inter', sans-serif;
    }
    .quote-font {
        font-family: 'Playfair Display', serif;
    }
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    @keyframes pulse-ring {
        0% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
        }
        70% {
            transform: scale(1);
            box-shadow: 0 0 0 10px rgba(99, 102, 241, 0);
        }
        100% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
        }
    }
    .fade-in {
        animation: fadeIn 0.5s ease-out forwards;
    }
    .btn-pulse:active {
        animation: pulse-ring 0.5s;
    }
    .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }
    .gradient-bg {
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
    }
    .gradient-text {
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .loader {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #6366f1;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4 antialiased">
    <div class="w-full max-w-2xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold mb-2 gradient-text">Joke & Quote</h1>
            <p class="text-gray-500 text-sm md:text-base">Brighten your day with humor and wisdom</p>
        </div>

        <!-- Main Card -->
        <div class="glass rounded-3xl shadow-xl shadow-indigo-100/50 p-6 md:p-10 border border-white/50">
            <!-- Category Filter -->
            <div class="flex gap-2 mb-8 justify-center flex-wrap">
                <button data-filter="all" class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 bg-indigo-600 text-white shadow-lg shadow-indigo-200">
                    All
                </button>
                <button data-filter="programming" class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 bg-white text-gray-600 hover:bg-gray-50 border border-gray-200">
                    Programming
                </button>
                <button data-filter="general" class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 bg-white text-gray-600 hover:bg-gray-50 border border-gray-200">
                    General
                </button>
                <button data-filter="quote" class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 bg-white text-gray-600 hover:bg-gray-50 border border-gray-200">
                    Quotes
                </button>
            </div>

            <!-- Content Display -->
            <div class="min-h-[200px] md:min-h-[240px] flex items-center justify-center mb-8">
                <div id="content" class="w-full text-center">
                    <div class="mb-4">
                        <svg id="content-icon" class="w-12 h-12 mx-auto text-indigo-400 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                    </div>
                    <p id="content-text" class="quote-font text-xl md:text-2xl text-gray-700 leading-relaxed italic">
                        Click the button below to get started
                    </p>
                    <p id="content-subtext" class="text-sm text-gray-400 mt-4 font-medium"></p>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center items-center">
                <button id="generate-btn" class="btn-pulse w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold rounded-2xl shadow-lg shadow-indigo-200 hover:shadow-xl hover:shadow-indigo-300 transition-all duration-300 hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
                    <span id="btn-text">Get Joke or Quote</span>
                    <div id="btn-loader" class="loader hidden"></div>
                </button>
                <button id="copy-btn" class="w-full sm:w-auto px-6 py-4 bg-white text-gray-700 font-medium rounded-2xl border border-gray-200 hover:bg-gray-50 transition-all duration-300 hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                    <span id="copy-text">Copy</span>
                </button>
            </div>

            <!-- Stats -->
            <div class="mt-8 pt-6 border-t border-gray-200/50 flex justify-center gap-8 text-center">
                <div>
                    <p class="text-2xl font-bold text-gray-700" id="joke-count">0</p>
                    <p class="text-xs text-gray-500 uppercase tracking-wide">Fetched</p>
                </div>
                <div>
                    <p class="text-2xl font-bold text-gray-700" id="laugh-count">0</p>
                    <p class="text-xs text-gray-500 uppercase tracking-wide">Saved</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6">
            <p class="text-xs text-gray-400">Powered by JokeAPI v2 & Quotable API</p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 pointer-events-none transition-all duration-300 text-sm font-medium">
        <span id="toast-text"></span>
    </div>

    <script>
        const state = {
            currentFilter: 'all',
            jokeCount: 0,
            laughCount: parseInt(localStorage.getItem('laughCount') || '0'),
            currentContent: '',
            isLoading: false
        };

        const elements = {
            content: document.getElementById('content'),
            contentText: document.getElementById('content-text'),
            contentSubtext: document.getElementById('content-subtext'),
            contentIcon: document.getElementById('content-icon'),
            generateBtn: document.getElementById('generate-btn'),
            btnText: document.getElementById('btn-text'),
            btnLoader: document.getElementById('btn-loader'),
            copyBtn: document.getElementById('copy-btn'),
            copyText: document.getElementById('copy-text'),
            jokeCount: document.getElementById('joke-count'),
            laughCount: document.getElementById('laugh-count'),
            toast: document.getElementById('toast'),
            toastText: document.getElementById('toast-text'),
            filterBtns: document.querySelectorAll('.filter-btn')
        };

        // Icons for different content types
        const icons = {
            joke: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>`,
            quote: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path>`
        };

        // Initialize
        function init() {
            elements.laughCount.textContent = state.laughCount;
            setupEventListeners();
            fetchContent();
        }

        function setupEventListeners() {
            elements.generateBtn.addEventListener('click', fetchContent);
            elements.copyBtn.addEventListener('click', copyContent);
            
            elements.filterBtns.forEach(btn => {
                btn.addEventListener('click', () => handleFilterChange(btn.dataset.filter));
            });

            // Keyboard shortcut
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !state.isLoading) {
                    e.preventDefault();
                    fetchContent();
                }
            });
        }

        function handleFilterChange(filter) {
            state.currentFilter = filter;
            
            elements.filterBtns.forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.remove('bg-white', 'text-gray-600', 'border', 'border-gray-200');
                    btn.classList.add('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-200');
                } else {
                    btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-200');
                    btn.classList.add('bg-white', 'text-gray-600', 'border', 'border-gray-200');
                }
            });
        }

        async function fetchContent() {
            if (state.isLoading) return;
            
            state.isLoading = true;
            elements.btnText.classList.add('hidden');
            elements.btnLoader.classList.remove('hidden');
            elements.generateBtn.disabled = true;

            try {
                let content;
                
                if (state.currentFilter === 'quote') {
                    content = await fetchQuote();
                } else if (state.currentFilter === 'all') {
                    content = Math.random() > 0.5 ? await fetchJoke() : await fetchQuote();
                } else {
                    content = await fetchJoke();
                }

                displayContent(content);
                state.jokeCount++;
                elements.jokeCount.textContent = state.jokeCount;
                
            } catch (error) {
                console.error('Error fetching content:', error);
                showToast('Failed to fetch content. Please try again.');
                displayError();
            } finally {
                state.isLoading = false;
                elements.btnText.classList.remove('hidden');
                elements.btnLoader.classList.add('hidden');
                elements.generateBtn.disabled = false;
            }
        }

        async function fetchJoke() {
            let url = 'https://v2.jokeapi.dev/joke/';
            
            if (state.currentFilter === 'programming') {
                url += 'Programming';
            } else if (state.currentFilter === 'general') {
                url += 'Miscellaneous';
            } else {
                url += 'Programming,Miscellaneous';
            }
            
            url += '?blacklistFlags=nsfw,religious,political,racist,sexist,explicit&type=single,twopart';

            const response = await fetch(url);
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.json();
            
            if (data.error) throw new Error('API returned error');
            
            return {
                type: 'joke',
                text: data.type === 'single' ? data.joke : `${data.setup}\n\n${data.delivery}`,
                category: data.category
            };
        }

        async function fetchQuote() {
            const response = await fetch('https://api.quotable.io/random');
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.json();
            
            return {
                type: 'quote',
                text: data.content,
                author: data.author
            };
        }

        function displayContent(content) {
            // Remove and re-add fade-in class to trigger animation
            elements.content.classList.remove('fade-in');
            void elements.content.offsetWidth; // Trigger reflow
            
            state.currentContent = content.text + (content.author ? ` — ${content.author}` : '');
            
            if (content.type === 'joke') {
                elements.contentText.textContent = content.text;
                elements.contentSubtext.textContent = `Category: ${content.category}`;
                elements.contentIcon.innerHTML = icons.joke;
            } else {
                elements.contentText.textContent = `"${content.text}"`;
                elements.contentSubtext.textContent = `— ${content.author}`;
                elements.contentIcon.innerHTML = icons.quote;
            }
            
            elements.content.classList.add('fade-in');
        }

        function displayError() {
            elements.contentText.textContent = "Oops! Couldn't fetch content right now.";
            elements.contentSubtext.textContent = 'Please check your connection and try again';
            elements.contentIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>`;
        }

        async function copyContent() {
            if (!state.currentContent) {
                showToast('Nothing to copy yet!');
                return;
            }

            try {
                await navigator.clipboard.writeText(state.currentContent);
                elements.copyText.textContent = 'Copied!';
                showToast('Copied to clipboard!');
                
                state.laughCount++;
                elements.laughCount.textContent = state.laughCount;
                localStorage.setItem('laughCount', state.laughCount.toString());
                
                setTimeout(() => {
                    elements.copyText.textContent = 'Copy';
                }, 2000);
            } catch (err) {
                showToast('Failed to copy');
            }
        }

        function showToast(message) {
            elements.toastText.textContent = message;
            elements.toast.classList.remove('opacity-0');
            elements.toast.classList.add('opacity-100');
            
            setTimeout(() => {
                elements.toast.classList.remove('opacity-100');
                elements.toast.classList.add('opacity-0');
            }, 2500);
        }

        // Start the app
        init();
    </script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
