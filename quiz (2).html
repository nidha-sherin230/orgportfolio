<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Random Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 100%);
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .app {
    width: 100%;
    max-width: 520px;
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 20px;
    padding: 1.75rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(90deg, #f472b6, #a78bfa, #38bdf8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .progress-label {
    font-size: 0.95rem;
    font-weight: 700;
    color: #e2e8f0;
    letter-spacing: 0.01em;
  }
  .score-label {
    font-size: 0.85rem;
    color: #94a3b8;
    font-weight: 500;
  }
  .progress {
    height: 6px;
    background: rgba(148, 163, 184, 0.15);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 1.25rem;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #38bdf8, #a78bfa);
    transition: width 0.4s ease;
  }
  .question {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 1.25rem;
    min-height: 3em;
  }
  .options { display: grid; gap: 0.65rem; }
  .opt {
    width: 100%;
    text-align: left;
    padding: 0.9rem 1rem;
    border-radius: 12px;
    border: 1px solid rgba(148, 163, 184, 0.2);
    background: rgba(15, 23, 42, 0.6);
    color: #e2e8f0;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .opt:hover:not(:disabled) {
    border-color: #a78bfa;
    background: rgba(167, 139, 250, 0.12);
    transform: translateY(-1px);
  }
  .opt:disabled { cursor: default; opacity: 0.85; }
  .opt.correct {
    background: rgba(34, 197, 94, 0.2);
    border-color: #22c55e;
    color: #bbf7d0;
  }
  .opt.wrong {
    background: rgba(239, 68, 68, 0.2);
    border-color: #ef4444;
    color: #fecaca;
  }
  .next {
    margin-top: 1.25rem;
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #f472b6, #a78bfa);
    color: white;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .next:disabled { opacity: 0.4; cursor: not-allowed; }
  .center { text-align: center; }
  .score {
    font-size: 3rem;
    font-weight: 700;
    background: linear-gradient(90deg, #38bdf8, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 1rem 0;
  }
  .msg { color: #cbd5e1; margin-bottom: 1.5rem; }
  .loader {
    border: 3px solid rgba(148,163,184,0.2);
    border-top-color: #a78bfa;
    border-radius: 50%;
    width: 36px; height: 36px;
    animation: spin 0.8s linear infinite;
    margin: 2rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .start-title {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 0.75rem;
    background: linear-gradient(90deg, #f472b6, #a78bfa, #38bdf8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .start-desc {
    color: #94a3b8;
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 1.5rem;
  }
  .start-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
  }

</style>
</head>
<body>
<div class="app center" id="app"></div>

<script>
const TOTAL = 5;
let questions = [], current = 0, score = 0, answered = false;
const app = document.getElementById('app');

function decode(str) {
  const t = document.createElement('textarea');
  t.innerHTML = str;
  return t.value;
}

function renderStart() {
  app.classList.add('center');
  app.innerHTML = `
    <div class="start-icon">🎯</div>
    <div class="start-title">Random Quiz</div>
    <p class="start-desc">Test your knowledge with ${TOTAL} quick multiple-choice questions. Good luck!</p>
    <button class="next" onclick="startQuiz()">Start Quiz</button>
  `;
}

function startQuiz() {
  app.classList.remove('center');
  app.innerHTML = '<div class="loader"></div>';
  loadQuestions();
}

async function loadQuestions() {
  try {
    const res = await fetch(`https://opentdb.com/api.php?amount=${TOTAL}&type=multiple`);
    const data = await res.json();
    questions = data.results.map(q => {
      const opts = [...q.incorrect_answers.map(decode), decode(q.correct_answer)]
        .map(v => ({ v, r: Math.random() }))
        .sort((a, b) => a.r - b.r)
        .map(x => x.v);
      return {
        question: decode(q.question),
        category: decode(q.category),
        correct: decode(q.correct_answer),
        options: opts
      };
    });
    renderQuestion();
  } catch (e) {
    app.innerHTML = `<p class="center msg">Failed to load quiz. <button class="next" onclick="location.reload()">Retry</button></p>`;
  }
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const pct = (current / TOTAL) * 100;
  app.innerHTML = `
    <h1>Random Quiz</h1>
    <div class="meta">
      <span class="progress-label">Question ${current + 1} of ${TOTAL}</span>
      <span class="score-label">Score: ${score}</span>
    </div>
    <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div style="font-size:0.75rem;color:#a78bfa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">${q.category}</div>
    <div class="question">${q.question}</div>
    <div class="options" id="options"></div>
    <button class="next" id="next" disabled>${current === TOTAL - 1 ? 'See Results' : 'Next Question'}</button>
  `;
  const optsEl = document.getElementById('options');
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, opt, q.correct);
    optsEl.appendChild(btn);
  });
  document.getElementById('next').onclick = nextQuestion;
}

function selectAnswer(btn, picked, correct) {
  if (answered) return;
  answered = true;
  const all = document.querySelectorAll('.opt');
  all.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });
  if (picked === correct) score++;
  document.getElementById('next').disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= TOTAL) renderResults();
  else renderQuestion();
}

function renderResults() {
  const pct = Math.round((score / TOTAL) * 100);
  let msg = "Keep practicing!";
  if (pct === 100) msg = "Perfect! 🎉";
  else if (pct >= 80) msg = "Excellent work!";
  else if (pct >= 60) msg = "Good job!";
  else if (pct >= 40) msg = "Not bad!";
  app.innerHTML = `
    <div class="center">
      <h1>Quiz Complete</h1>
      <div class="score">${score} / ${TOTAL}</div>
      <p class="msg">${msg} You scored ${pct}%.</p>
      <button class="next" onclick="restart()">Play Again</button>
    </div>
  `;
}

function restart() {
  current = 0; score = 0;
  renderStart();
}

renderStart();
</script>
</body>
</html>
